<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>放貸管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; padding-top: 50px; }
        .card { border: none; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn-primary { background: #6f42c1; border: none; }
        .table thead { background: #6f42c1; color: white; }
    </style>
</head>
<body>

<div class="container">
    <!-- 表單區 -->
    <div class="card p-4 mb-5">
        <h3 class="mb-4 text-primary">新增放貸案 (自動產生計畫表)</h3>
        <form id="loanForm" class="row g-3">
            <div class="col-md-3"><label class="form-label">借款人</label><input type="text" name="name" class="form-control" required></div>
            <div class="col-md-3"><label class="form-label">貸款金額</label><input type="number" name="amount" class="form-control" required></div>
            <div class="col-md-2"><label class="form-label">年利率 (%)</label><input type="number" step="0.01" name="rate" class="form-control" value="16"></div>
            <div class="col-md-2"><label class="form-label">期數</label><input type="number" name="periods" class="form-control" value="60"></div>
            <div class="col-md-2"><label class="form-label">還款模式</label>
                <select name="mode" class="form-select"><option value="只繳息">只繳息</option><option value="本息攤還">本息攤還</option></select>
            </div>
            <div class="col-md-3"><label class="form-label">設定人</label><input type="text" name="setter" class="form-control"></div>
            <div class="col-md-3"><label class="form-label">借款日期</label><input type="date" name="date" class="form-control"></div>
            <div class="col-md-3"><label class="form-label">綁約期限</label><input type="text" name="contract" class="form-control" placeholder="1年/20%"></div>
            <div class="col-md-3"><label class="form-label">月付總額 (試算)</label><input type="number" name="monthlyPay" class="form-control"></div>
            <div class="col-12 text-end"><button type="submit" class="btn btn-primary btn-lg">提交資料並生成計畫表</button></div>
        </form>
    </div>

    <!-- 列表區 -->
    <div class="card p-4">
        <h3 class="mb-4">現有客戶清單</h3>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>借款人</th><th>金額</th><th>模式</th><th>設定人</th><th>利率</th><th>月付總額</th><th>分紅</th>
                    </tr>
                </thead>
                <tbody id="listBody"><tr><td colspan="7" class="text-center">讀取中...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby9t5S76oYh6RFxjmLRhK8SqgrkoBMj14mseTjS1lfN9FvL-tAh46jeIrjy8zkWCf97Qw/exec";

    // 讀取資料
    function loadData() {
        fetch(SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.forEach(row => {
                    html += `<tr>
                        <td><b>${row['借款人']}</b></td>
                        <td>$${Number(row['貸款金額']).toLocaleString()}</td>
                        <td>${row['還款模式']}</td>
                        <td>${row['設定人']}</td>
                        <td>${(row['利率(年)']*100).toFixed(2)}%</td>
                        <td class="text-danger">$${Number(row['月付總額']).toLocaleString()}</td>
                        <td class="text-success">$${Number(row['分紅金額(月)']).toLocaleString()}</td>
                    </tr>`;
                });
                document.getElementById('listBody').innerHTML = html;
            });
    }

    // 提交表單
    document.getElementById('loanForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true; btn.innerText = "處理中...";

        const formData = Object.fromEntries(new FormData(this).entries());
        
        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(formData)
        })
        .then(res => res.json())
        .then(res => {
            alert(res.message);
            location.reload();
        })
        .catch(err => alert("發生錯誤，請檢查 GAS 部署權限"));
    });

    loadData();
</script>
</body>
</html>
